    <style>
      /* Critical CSS for initial load */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body, #root {
        min-height: 100%;
        width: 100%;
      }

      /* POS app mode: fixed viewport, no scroll */
      body.app-mode,
      body.app-mode html {
        height: 100%;
        overflow: hidden;
      }
      body.app-mode #root {
        height: 100%;
        overflow: hidden;
      }

      /* Mobile portrait: allow scrolling */
      @media (max-width: 640px) {
        body.app-mode,
        body.app-mode html {
          height: auto;
          min-height: 100%;
          overflow: auto;
        }
        body.app-mode #root {
          height: auto;
          min-height: 100%;
          overflow: auto;
        }
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f1f5f9;
        color: #1e293b;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        -webkit-user-select: none;
      }

      /* Loading spinner shown before React mounts */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #root:empty::after {
        content: '';
        width: 48px;
        height: 48px;
        border: 4px solid #e2e8f0;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Hide noscript content when JS is active */
      .seo-fallback { display: none; }
    </style>
