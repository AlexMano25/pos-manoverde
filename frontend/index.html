    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Qu'est-ce que POS Mano Verde ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "POS Mano Verde est un logiciel de caisse (Point of Sale) et de gestion commerciale accessible en ligne. Il permet de gerer les ventes, les stocks, les clients et les employes depuis un telephone, une tablette ou un ordinateur."
          }
        },
        {
          "@type": "Question",
          "name": "POS Mano Verde fonctionne-t-il sans internet ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. POS Mano Verde stocke toutes les donnees localement. Vous pouvez vendre, gerer les produits et imprimer des tickets meme sans connexion. Les donnees se synchronisent automatiquement quand internet revient."
          }
        },
        {
          "@type": "Question",
          "name": "A qui s'adresse POS Mano Verde ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "POS Mano Verde s'adresse a tous les commerces : restaurants, boutiques, supermarches, pharmacies, salons de coiffure, garages auto, hotels, boulangeries, et 26 types d'activites au total."
          }
        },
        {
          "@type": "Question",
          "name": "Quel materiel faut-il pour utiliser POS Mano Verde ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Un simple telephone Android, une tablette ou un ordinateur avec un navigateur web suffit. Une imprimante Bluetooth portable est recommandee pour les tickets de caisse."
          }
        },
        {
          "@type": "Question",
          "name": "Y a-t-il un essai gratuit ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. POS Mano Verde propose un plan gratuit avec les fonctionnalites de base, ainsi qu'un credit initial de 10 USD pour le mode pay-as-you-grow qui permet 500 tickets sans frais."
          }
        },
        {
          "@type": "Question",
          "name": "Peut-on gerer plusieurs caisses ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. Les plans Starter, Pro et Enterprise permettent de gerer plusieurs magasins et plusieurs caisses simultanement, avec synchronisation en temps reel."
          }
        },
        {
          "@type": "Question",
          "name": "POS Mano Verde permet-il la gestion de stock ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui. Le logiciel suit automatiquement les niveaux de stock a chaque vente, envoie des alertes de stock bas, et permet les inventaires, transferts de stock et suivi des pertes."
          }
        }
      ]
    }
    </script>

    <style>
      /* Critical CSS for initial load */
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body, #root {
        min-height: 100%;
        width: 100%;
      }

      /* POS app mode: fixed viewport, no scroll */
      body.app-mode,
      body.app-mode html {
        height: 100%;
        overflow: hidden;
      }
      body.app-mode #root {
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          'Helvetica Neue', Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f1f5f9;
        color: #1e293b;
        touch-action: manipulation;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
        -webkit-user-select: none;
      }

      /* Loading spinner shown before React mounts */
      #root:empty {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #root:empty::after {
        content: '';
        width: 48px;
        height: 48px;
        border: 4px solid #e2e8f0;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Hide noscript content when JS is active */
      .seo-fallback { display: none; }
    </style>
