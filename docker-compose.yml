version: '3.8'
services:
  pos-server:
    build: ./backend
    container_name: pos-manoverde
    ports:
      - "4000:4000"
    volumes:
      - pos-data:/data
      - ./frontend/dist:/app/public  # serve built frontend
    environment:
      - PORT=4000
      - JWT_SECRET=${JWT_SECRET:-pos-manoverde-production-key}
      - DB_PATH=/data/pos.db
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - pos-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pos-data:
    driver: local

networks:
  pos-network:
    driver: bridge
